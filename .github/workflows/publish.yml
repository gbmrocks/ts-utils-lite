name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write

jobs:
  release:
    if: "contains(github.event.head_commit.message, 'chore: release')"
    runs-on: ubuntu-latest

    steps:
      # -----------------------------
      # Checkout
      # -----------------------------
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -----------------------------
      # Setup Node
      # -----------------------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      # -----------------------------
      # Install dependencies
      # -----------------------------
      - name: Install dependencies
        run: npm install

      # -----------------------------
      # Build
      # -----------------------------
      - name: Build
        run: npm run build --workspaces

      # -----------------------------
      # Version packages
      # -----------------------------
      - name: Version packages
        run: npx changeset version

      # -----------------------------
      # Publish packages
      # -----------------------------
      - name: Publish packages
        run: npx changeset publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # -----------------------------
      # Install jq
      # -----------------------------
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # -----------------------------
      # WAIT (IMPORTANT)
      # -----------------------------
      - name: Wait for npm registry sync
        run: sleep 60

      # -----------------------------
      # Deprecate old versions
      # Keep latest 2 only
      # -----------------------------
      - name: Deprecate old versions safely
        run: |
          set -e

          PACKAGES=(
            ts-string-lite
            ts-array-lite
            ts-date-lite
            ts-object-lite
            ts-number-lite
            ts-validation-lite
            ts-id-lite
            ts-cookie-lite
            ts-utils-lite
          )

          for pkg in "${PACKAGES[@]}"; do
            echo "====================================="
            echo "Processing $pkg"
            echo "====================================="

            versions_json=$(npm view "$pkg" versions --json 2>/dev/null || echo "[]")

            if [ "$versions_json" = "[]" ]; then
              echo "Skipping $pkg (no versions found)"
              continue
            fi

            versions=$(echo "$versions_json" | jq -r '.[]' | sort -V)

            latest_two=$(echo "$versions" | tail -n 2)

            echo "Keeping:"
            echo "$latest_two"

            for v in $versions; do
              if ! echo "$latest_two" | grep -qx "$v"; then
                echo "Deprecating $pkg@$v"

                npm deprecate "$pkg@$v" \
                  "Deprecated: please use latest 2 versions" || \
                  echo "⚠️ Failed $pkg@$v"
              fi
            done

          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # -----------------------------
      # Commit changes
      # -----------------------------
      - name: Commit release
        run: |
          git config user.name "gbmrocks"
          git config user.email "rockstarmody@gmail.com"

          git add .
          git commit -m "chore: release" || echo "no changes"
          git push
