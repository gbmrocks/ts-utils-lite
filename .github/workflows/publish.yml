name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write
  pull-requests: write

jobs:
  release:
    # 🚨 CRITICAL: prevent infinite loop from release commits
    if: "!contains(github.event.head_commit.message, 'chore: release packages')"
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout full history (required for changesets)
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2️⃣ Setup Node 24 + npm
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: npm install

      # 4️⃣ Detect changed packages (safe + no src dependency)
      - name: Detect changed packages
        id: changes
        run: |
          CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} \
            | grep '^packages/' \
            | grep -v '/dist/' \
            | grep -v 'node_modules' \
            | cut -d/ -f2 \
            | sort -u || true)

          echo "changed=$CHANGED" >> $GITHUB_OUTPUT

      # 5️⃣ Auto-create changeset only if needed
      - name: Create auto changeset
        if: steps.changes.outputs.changed != ''
        run: |
          mkdir -p .changeset
          FILE=".changeset/auto-$(date +%s).md"

          echo "---" > $FILE

          for pkg in ${{ steps.changes.outputs.changed }}; do
            echo "\"$pkg\": patch" >> $FILE
          done

          echo "---" >> $FILE
          echo "" >> $FILE
          echo "Auto release" >> $FILE

      # 6️⃣ Release via Changesets (version + publish + PR/release)
      - name: Changesets Release
        uses: changesets/action@v1
        with:
          publish: npx changeset publish
          version: npx changeset version
          commit: "chore: release packages"
          title: "Release packages"
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 7️⃣ Cleanup working tree (safety)
      - name: Clean git state
        run: git reset --hard
