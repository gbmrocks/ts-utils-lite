name: Publish Packages

on:
  release:
    types: [published]
  push:
    branches:
      - dev

permissions:
  id-token: write
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package:
          - ts-string-lite
          - ts-array-lite
          - ts-date-lite
          - ts-object-lite
          - ts-number-lite
          - ts-validation-lite
          - ts-id-lite
          - ts-cookie-lite
          - ts-utils-lite
    steps:
      - uses: actions/checkout@v6

      - name: Determine version
        id: version
        run: |
          git fetch --tags --all
          
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            echo "channel=latest" >> $GITHUB_OUTPUT
          else
            LAST_STABLE=$(git tag -l | grep -vE 'beta' | sort -V | tail -1 | sed 's/^v//')
            LAST_BETA=$(git tag -l | grep -E "v?${LAST_STABLE}-beta\." | sort -V | tail -1)
            
            if [ -z "$LAST_BETA" ]; then
              BETA_NUM=1
            else
              BETA_NUM=$(echo "$LAST_BETA" | grep -oE '[0-9]+$' || echo "1")
              BETA_NUM=$((BETA_NUM + 1))
            fi
            
            VERSION="${LAST_STABLE}-beta.${BETA_NUM}"
            echo "channel=beta" >> $GITHUB_OUTPUT
          fi
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Update package.json version
        run: |
          VERSION='${{ steps.version.outputs.version }}'
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" packages/${{ matrix.package }}/package.json

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Build package
        run: |
          cd packages/${{ matrix.package }}
          npx tsc

      - name: Publish to npm
        run: |
          cd packages/${{ matrix.package }}
          npm publish --access public --tag ${{ steps.version.outputs.channel }}

      - name: Create tag (beta only)
        if: github.event_name != 'release'
        run: |
          git tag ${{ matrix.package }}-${{ steps.version.outputs.version }}
          git push origin ${{ matrix.package }}-${{ steps.version.outputs.version }}