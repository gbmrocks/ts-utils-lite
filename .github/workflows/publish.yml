name: Publish Package

on:
  release:
    types: [published]
  push:
    branches:
      - dev

permissions:
  id-token: write
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            echo "channel=latest" >> $GITHUB_OUTPUT
          else
            git fetch --tags
            # Get last stable tag (no beta suffix)
            LAST_STABLE=$(git tag -l 'v*[0-9]' --sort=-v:refname | head -1 | sed 's/^v//' || echo "0.0.0")
            LAST_BETA=$(git tag -l 'v*[0-9]-beta.*' --sort=-v:refname | head -1 || echo "")
            
            if [ -z "$LAST_BETA" ]; then
              BETA_NUM=1
            else
              BETA_NUM=$(echo "$LAST_BETA" | grep -oE 'beta\.[0-9]+' | grep -oE '[0-9]+')
              BETA_NUM=$((BETA_NUM + 1))
            fi
            
            VERSION="${LAST_STABLE}-beta.${BETA_NUM}"
            echo "channel=beta" >> $GITHUB_OUTPUT
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Update package.json version
        run: |
          VERSION='${{ steps.version.outputs.version }}'
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" src/package.json
          cat src/package.json | head -5

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - run: npm i

      - name: Build pure TypeScript package
        run: |
          npx tsc -p tsconfig-pure.json
          cp src/package.json package.json

      - name: Publish to npm
        run: |
          npm publish --access public --tag ${{ steps.version.outputs.channel }}

      - name: Create tag (beta only)
        if: github.event_name != 'release'
        run: |
          git tag ${{ steps.version.outputs.version }}
          git push origin ${{ steps.version.outputs.version }}
