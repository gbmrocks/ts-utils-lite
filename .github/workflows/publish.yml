name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write

jobs:
  release:
    if: "contains(github.event.head_commit.message, 'chore: release')"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install
        run: npm install

      - name: Build
        run: npm run build --workspaces

      - name: Version packages
        run: npx changeset version

      - name: Publish
        run: npx changeset publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ✅ KEEP ONLY LAST 2 VERSIONS PER PACKAGE
      - name: Deprecate old versions (keep latest 2)
        run: |
          npm install -g jq

          PACKAGES=(
            ts-string-lite
            ts-array-lite
            ts-date-lite
            ts-object-lite
            ts-number-lite
            ts-validation-lite
            ts-id-lite
            ts-cookie-lite
            ts-utils-lite
          )

          for pkg in "${PACKAGES[@]}"; do
            echo "Processing $pkg..."

            # get all versions sorted
            versions=$(npm view $pkg versions --json | jq -r '.[]')

            # get latest 2 versions
            latest_two=$(echo "$versions" | tail -n 2)

            for v in $versions; do
              if ! echo "$latest_two" | grep -qx "$v"; then
                echo "Deprecating $pkg@$v"
                npm deprecate "$pkg@$v" "Deprecated: please use latest 2 versions"
              fi
            done

          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit release
        run: |
          git config user.name "gbmrocks"
          git config user.email "rockstarmody@gmail.com"

          git add .
          git commit -m "chore: release" || echo "no changes"
          git push
