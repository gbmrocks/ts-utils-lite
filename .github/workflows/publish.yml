name: Auto Release & Publish

on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout full history
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2️⃣ Setup Node (OIDC enabled)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: npm install

      # 4️⃣ Detect ONLY source changes (IGNORE dist)
      - name: Detect changed packages
        id: changes
        run: |
          CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} \
            | grep '^packages/.*/src/' \
            | cut -d/ -f2 \
            | sort -u)

          echo "changed=$CHANGED" >> $GITHUB_OUTPUT

      # 5️⃣ Auto create changeset (NO dist included)
      - name: Auto create changeset
        if: steps.changes.outputs.changed != ''
        run: |
          mkdir -p .changeset
          FILE=".changeset/auto-$(date +%s).md"

          echo "---" > $FILE
          for pkg in ${{ steps.changes.outputs.changed }}; do
            echo "\"$pkg\": patch" >> $FILE
          done
          echo "---" >> $FILE
          echo "" >> $FILE
          echo "Auto release" >> $FILE

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .changeset
          git commit -m "chore: auto changeset [skip ci]"
          git push origin main

      # 6️⃣ Version + Publish + GitHub Release (Changesets handles everything)
      - name: Version, Tag, Publish
        uses: changesets/action@v1
        with:
          publish: npx changeset publish
          version: npx changeset version
          commit: "chore: release packages"
          title: "Release packages"
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 7️⃣ Safety: ensure dist never leaks into git state
      - name: Cleanup git staging
        run: git reset --hard
