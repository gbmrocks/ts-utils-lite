name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2️⃣ Setup Node (OIDC ready)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      # 3️⃣ Install deps (workspace safe)
      - name: Install dependencies
        run: npm install

      # 4️⃣ Create changeset ONLY if src changed (ignore dist/node_modules)
      - name: Detect changed packages
        id: changes
        run: |
          CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} \
            | grep '^packages/.*/src/' \
            | cut -d/ -f2 \
            | sort -u || true)

          echo "changed=$CHANGED" >> $GITHUB_OUTPUT

      # 5️⃣ Auto create changeset (NO git push here!)
      - name: Create auto changeset
        if: steps.changes.outputs.changed != ''
        run: |
          mkdir -p .changeset
          FILE=".changeset/auto-$(date +%s).md"

          echo "---" > $FILE
          for pkg in ${{ steps.changes.outputs.changed }}; do
            echo "\"$pkg\": patch" >> $FILE
          done
          echo "---" >> $FILE
          echo "" >> $FILE
          echo "Auto release" >> $FILE

      # 6️⃣ Version + commit + tag + PR/release handling
      - name: Changesets Release
        uses: changesets/action@v1
        with:
          publish: npx changeset publish
          version: npx changeset version
          commit: "chore: release packages"
          title: "Release packages"
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 7️⃣ Safety cleanup (prevents dirty workspace issues)
      - name: Clean git state
        run: git reset --hard
