name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write

jobs:
  release:
    # 🚨 ignore PR automation commits
    if: |
      !contains(github.event.head_commit.message, 'chore: release') &&
      !contains(github.event.head_commit.message, 'Version Packages') &&
      !contains(github.event.head_commit.message, 'changeset-release')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install
        run: npm install

      - name: Build
        run: npm run build --workspaces

      # ONLY version + publish
      - name: Version packages
        run: npx changeset version

      - name: Publish packages
        run: npx changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit release changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .
          git commit -m "chore: release packages" || echo "no changes"
          git push
