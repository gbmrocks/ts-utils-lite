name: Publish Package

on:
  release:
    types: [published]
  push:
    branches:
      - dev

permissions:
  id-token: write
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            echo "channel=latest" >> $GITHUB_OUTPUT
          else
            git fetch --tags
            LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")

            LAST_BETA=$(git tag -l 'v*-beta.*' | sort -V | tail -1 || echo "")

            if [ -z "$LAST_BETA" ]; then
              LAST_BETA="v0.0.0-beta.0"
            fi

            BETA_NUM=$(echo $LAST_BETA | grep -oE '[0-9]+$' || echo "0")
            BETA_NUM=$((BETA_NUM + 1))

            LAST_VERSION=${LAST_TAG#v}
            VERSION="${LAST_VERSION}-beta.${BETA_NUM}"
            echo "channel=beta" >> $GITHUB_OUTPUT
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Update package.json version
        run: |
          VERSION='${{ steps.version.outputs.version }}'
          cd projects/ngx-utils-lite
          npm version $VERSION --no-git-tag-version

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - run: npm i

      - run: npx ng build ngx-utils-lite

      - name: Publish to npm
        run: |
          cd dist/ngx-utils-lite
          npm publish --access public --tag ${{ steps.version.outputs.channel }}

      - name: Create tag (beta only)
        if: github.event_name != 'release'
        run: |
          git tag ${{ steps.version.outputs.version }}
          git push origin ${{ steps.version.outputs.version }}
