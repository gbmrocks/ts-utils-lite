name: Publish Package

on:
  release:
    types: [published]
  push:
    branches:
      - dev

permissions:
  id-token: write
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Determine version
        id: version
        run: |
          git fetch --tags --all
          
          echo "=== All tags ==="
          git tag -l | sort -V
          
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            echo "channel=latest" >> $GITHUB_OUTPUT
            echo "Release mode: $VERSION"
          else
            # Get highest stable version (with or without v prefix)
            LAST_STABLE=$(git tag -l | grep -vE 'beta' | sort -V | tail -1 | sed 's/^v//')
            echo "Last stable: $LAST_STABLE"
            
            # Get beta tag for this version
            LAST_BETA=$(git tag -l | grep -E "v?${LAST_STABLE}-beta\." | sort -V | tail -1)
            echo "Last beta: $LAST_BETA"
            
            if [ -z "$LAST_BETA" ]; then
              BETA_NUM=1
            else
              BETA_NUM=$(echo "$LAST_BETA" | grep -oE '[0-9]+$' || echo "1")
              BETA_NUM=$((BETA_NUM + 1))
            fi
            
            echo "New beta number: $BETA_NUM"
            VERSION="${LAST_STABLE}-beta.${BETA_NUM}"
            echo "Beta mode: $VERSION"
            echo "channel=beta" >> $GITHUB_OUTPUT
          fi
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Update package.json version
        run: |
          VERSION='${{ steps.version.outputs.version }}'
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" src/package.json
          cat src/package.json | head -5

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - run: npm i

      - name: Build pure TypeScript package
        run: |
          npx tsc -p tsconfig-pure.json
          # Copy JS and DTS files to root for publishing
          cp src/*.js .
          cp src/*.d.ts .
          # Copy package.json to root
          cp src/package.json package.json
          # List files to verify
          echo "=== Files to publish ==="
          ls -la

      - name: Publish to npm
        run: |
          npm publish --access public --tag ${{ steps.version.outputs.channel }}

      - name: Create tag (beta only)
        if: github.event_name != 'release'
        run: |
          git tag ${{ steps.version.outputs.version }}
          git push origin ${{ steps.version.outputs.version }}
