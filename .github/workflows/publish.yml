name: Auto Release & Publish

on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm install

      # 🔍 Detect changed packages
      - name: Detect changed packages
        id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD | grep '^packages/' | cut -d/ -f2 | sort -u)
          echo "changed=$CHANGED" >> $GITHUB_OUTPUT

      # 🦋 Auto create changeset if packages changed
      - name: Auto create changeset
        if: steps.changes.outputs.changed != ''
        run: |
          mkdir -p .changeset
          FILE=".changeset/auto-$(date +%s).md"

          echo "---" > $FILE
          for pkg in ${{ steps.changes.outputs.changed }}; do
            echo "\"$pkg\": patch" >> $FILE
          done
          echo "---" >> $FILE
          echo "" >> $FILE
          echo "Auto release" >> $FILE

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .changeset
          git commit -m "chore: auto changeset"
          git push

      # 🚀 Version + Publish + GitHub Release
      - name: Create Release & Publish
        uses: changesets/action@v1
        with:
          publish: npx changeset publish
          commit: "chore: release packages"
          title: "Release packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
