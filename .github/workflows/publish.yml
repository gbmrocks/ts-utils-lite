name: Auto Release & Publish

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout full history
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2️⃣ Setup Node with OIDC
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: npm install

      # 4️⃣ Detect changed packages
      - name: Detect changed packages
        id: changes
        run: |
          CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} \
            | grep '^packages/' \
            | cut -d/ -f2 \
            | sort -u)

          echo "changed=$CHANGED" >> $GITHUB_OUTPUT

      # 5️⃣ Auto-create changeset if needed (NO PUSH HERE)
      - name: Auto create changeset
        if: steps.changes.outputs.changed != ''
        run: |
          mkdir -p .changeset
          FILE=".changeset/auto-$(date +%s).md"

          echo "---" > $FILE
          for pkg in ${{ steps.changes.outputs.changed }}; do
            echo "\"$pkg\": patch" >> $FILE
          done
          echo "---" >> $FILE
          echo "" >> $FILE
          echo "Auto release" >> $FILE

      # 6️⃣ Let official changesets action handle everything
      - name: Version, Tag, Publish, Release
        uses: changesets/action@v1
        with:
          publish: npx changeset publish
          version: npx changeset version
          commit: "chore: release packages"
          title: "Release packages"
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
