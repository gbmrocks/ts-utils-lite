name: Auto Changeset PR

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  changeset:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2   # IMPORTANT FIX

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      # đź”Ą FIXED CHANGE DETECTION (KEY FIX)
      - name: Generate changeset
        run: |
          set -e

          HEAD=$(git rev-parse HEAD)
          BASE=$(git rev-parse HEAD^)

          echo "BASE=$BASE"
          echo "HEAD=$HEAD"

          CHANGED=$(git diff --name-only $BASE $HEAD \
            | grep '^packages/' \
            | cut -d/ -f2 \
            | sort -u || true)

          echo "Changed packages: $CHANGED"

          if [ -z "$CHANGED" ]; then
            echo "No package changes detected"
            exit 0
          fi

          mkdir -p .changeset
          FILE=".changeset/auto-$(date +%s).md"

          echo "---" > $FILE

          HAS_VALID=false

          for pkg in $CHANGED; do
            PKG_NAME=$(node -e "
              try {
                const p=require('./packages/$pkg/package.json');
                console.log(p.name);
              } catch(e) {}
            ")

            if [ ! -z "$PKG_NAME" ]; then
              echo "\"$PKG_NAME\": patch" >> $FILE
              HAS_VALID=true
            fi
          done

          echo "---" >> $FILE

          REPO_URL="https://github.com/${{ github.repository }}"

          echo "" >> $FILE
          echo "### Commits included in this release:" >> $FILE

          git log $BASE..$HEAD --no-merges --pretty=format:"%H|%s" | while IFS="|" read -r hash msg
          do
            short=${hash:0:7}
            echo "- $msg ([${short}]($REPO_URL/commit/$hash))" >> $FILE
          done

          if [ "$HAS_VALID" = false ]; then
            echo "No valid packages found"
            rm -f $FILE
          fi

      # đź”Ą COMMIT + PUSH
      - name: Commit and push branch
        run: |
          set -e

          BRANCH="changeset-auto-${GITHUB_SHA::7}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"

          git add .changeset

          if git diff --cached --quiet; then
            echo "No changeset created"
            exit 0
          fi

          git commit -m "chore: add auto changeset"

          git push origin "$BRANCH"

          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      # đźš€ CREATE PR
      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore: release packages" \
            --body "Auto-generated changeset PR"
