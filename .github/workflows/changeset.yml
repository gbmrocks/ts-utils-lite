name: Auto Changeset PR

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  changeset:
    # ignore release commits
    if: "!contains(github.event.head_commit.message, 'chore: release')"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      # 🔥 Generate changeset with commits + links
      - name: Generate changeset if needed
        run: |
          BASE=${{ github.event.before }}
          HEAD=${{ github.sha }}

          echo "Base: $BASE"
          echo "Head: $HEAD"

          # Detect changed packages
          CHANGED=$(git diff --name-only $BASE $HEAD \
            | grep '^packages/' \
            | grep -v '/dist/' \
            | cut -d/ -f2 \
            | sort -u || true)

          if [ -z "$CHANGED" ]; then
            echo "No package changes detected"
            exit 0
          fi

          mkdir -p .changeset
          FILE=".changeset/auto-$(date +%s).md"

          echo "---" > $FILE

          HAS_VALID=false

          # Map folder → package.json name
          for pkg in $CHANGED; do
            PKG_NAME=$(node -e "
              try {
                const p=require('./packages/$pkg/package.json');
                console.log(p.name);
              } catch(e) {
                process.exit(0);
              }
            ")

            if [ ! -z "$PKG_NAME" ]; then
              echo "\"$PKG_NAME\": patch" >> $FILE
              HAS_VALID=true
            fi
          done

          echo "---" >> $FILE

          # 🔥 Commit section with GitHub links
          REPO_URL="https://github.com/${{ github.repository }}"

          echo "" >> $FILE
          echo "### Commits included in this release:" >> $FILE

          git log $BASE..$HEAD --no-merges --pretty=format:"%H|%s" | while IFS="|" read hash msg
          do
            short_hash=$(echo $hash | cut -c1-7)
            echo "- $msg ([${short_hash}]($REPO_URL/commit/$hash))" >> $FILE
          done

          # safety cleanup
          if [ "$HAS_VALID" = false ]; then
            echo "No valid packages found, deleting changeset"
            rm -f $FILE
          fi

      # 🚀 Create PR
      - name: Create Pull Request
        uses: changesets/action@v1
        with:
          title: "chore: release packages"
          commit: "chore: release packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
