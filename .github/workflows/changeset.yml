name: Auto Changeset PR

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  changeset:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Generate changeset
        run: |
          set -e

          git fetch origin main

          HEAD=$(git rev-parse HEAD)
          BASE=$(git merge-base HEAD origin/main)

          CHANGED=$(git diff --name-only $BASE $HEAD \
            | grep '^packages/' \
            | cut -d/ -f2 \
            | sort -u || true)

          if [ -z "$CHANGED" ]; then
            echo "No changes"
            exit 0
          fi

          mkdir -p .changeset
          FILE=".changeset/auto-$(date +%s).md"

          echo "---" > $FILE

          for pkg in $CHANGED; do
            PKG_NAME=$(node -e "
              try {
                const p=require('./packages/$pkg/package.json');
                console.log(p.name);
              } catch(e) {}
            ")

            if [ ! -z "$PKG_NAME" ]; then
              echo "\"$PKG_NAME\": patch" >> $FILE
            fi
          done

          echo "---" >> $FILE

          git log $BASE..$HEAD --no-merges --pretty=format:"- %s" >> $FILE

      # 🔥 CREATE NEW BRANCH (CRITICAL FIX)
      - name: Create PR branch
        run: |
          BRANCH="changeset-auto-${GITHUB_SHA::7}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b $BRANCH

          git add .changeset

          if git diff --cached --quiet; then
            echo "No changeset to commit"
            exit 0
          fi

          git commit -m "chore: add changeset"
          git push origin $BRANCH

          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      # 🚀 OPEN PR CORRECTLY
      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore: release packages" \
            --body "Auto-generated changeset PR"
