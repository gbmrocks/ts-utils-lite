name: Auto Changeset PR

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  changeset:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Generate changeset
        run: |
          set -e

          git fetch origin main

          HEAD=$(git rev-parse HEAD)
          BASE=$(git merge-base HEAD origin/main)

          echo "BASE=$BASE"
          echo "HEAD=$HEAD"

          CHANGED=$(git diff --name-only $BASE $HEAD \
            | grep '^packages/' \
            | cut -d/ -f2 \
            | sort -u || true)

          if [ -z "$CHANGED" ]; then
            echo "No package changes"
            exit 0
          fi

          mkdir -p .changeset
          FILE=".changeset/auto-$(date +%s).md"

          echo "---" > $FILE

          for pkg in $CHANGED; do
            PKG_NAME=$(node -e "
              try {
                const p=require('./packages/$pkg/package.json');
                console.log(p.name);
              } catch(e) {}
            ")

            if [ ! -z "$PKG_NAME" ]; then
              echo "\"$PKG_NAME\": patch" >> $FILE
            fi
          done

          echo "---" >> $FILE

          REPO="https://github.com/${{ github.repository }}"

          echo "" >> $FILE
          echo "### Commits included in this release:" >> $FILE

          git log $BASE..$HEAD --no-merges --pretty=format:"%H|%s" | while IFS="|" read h m
          do
            echo "- $m ([${h:0:7}]($REPO/commit/$h))" >> $FILE
          done

      - name: Commit changeset
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .changeset

          if git diff --cached --quiet; then
            echo "No changeset created"
            exit 0
          fi

          git commit -m "chore: add auto changeset"
          git push origin main

      # 🚀 CREATE PR USING GITHUB CLI (THIS FIXES EVERYTHING)
      - name: Create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "chore: release packages" \
            --body "Auto-generated changeset PR" \
            --base main \
            --head main || true
