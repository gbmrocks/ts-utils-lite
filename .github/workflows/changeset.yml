name: Auto Changeset PR

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  changeset:
    # 🚨 ignore release commits to prevent loops
    if: "!contains(github.event.head_commit.message, 'chore: release')"
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout full history
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2️⃣ Setup Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # 3️⃣ Install deps
      - name: Install dependencies
        run: npm install --legacy-peer-deps

      # 4️⃣ Detect changed packages + generate changeset
      - name: Generate changeset if needed
        run: |
          CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} \
            | grep '^packages/' \
            | grep -v '/dist/' \
            | cut -d/ -f2 \
            | sort -u || true)

          if [ -z "$CHANGED" ]; then
            echo "No package changes"
            exit 0
          fi

          mkdir -p .changeset
          FILE=".changeset/auto-$(date +%s).md"

          echo "---" > $FILE

          for pkg in $CHANGED; do
            # get real package name from package.json
            PKG_NAME=$(node -e "
              const fs=require('fs');
              const p=require('./packages/$pkg/package.json');
              console.log(p.name);
            ")

            echo "\"$PKG_NAME\": patch" >> $FILE
          done

          echo "---" >> $FILE

          # 5️⃣ REAL commit-based changelog (NO MORE 'auto release')
          echo "" >> $FILE
          echo "### Changes" >> $FILE

          git log --pretty=format:"- %s" ${{ github.event.before }}..${{ github.sha }} \
            | grep -v "Merge" \
            | grep -v "chore: release" \
            | head -50 >> $FILE

      # 6️⃣ Create PR via Changesets
      - name: Create Release PR
        uses: changesets/action@v1
        with:
          title: "chore: release packages"
          commit: "chore: release packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
