name: Auto Changeset PR

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  changeset:
    if: "!contains(github.event.head_commit.message, 'chore: release')"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      # 🔥 Generate changeset
      - name: Generate changeset
        run: |
          set -e

          git fetch origin main

          HEAD=$(git rev-parse HEAD)
          BASE=$(git merge-base HEAD origin/main)

          CHANGED=$(git diff --name-only $BASE $HEAD \
            | grep '^packages/' \
            | grep -v '/dist/' \
            | cut -d/ -f2 \
            | sort -u || true)

          if [ -z "$CHANGED" ]; then
            echo "No package changes"
            exit 0
          fi

          mkdir -p .changeset
          FILE=".changeset/auto-$(date +%s).md"

          echo "---" > $FILE

          for pkg in $CHANGED; do
            PKG_NAME=$(node -e "
              try {
                const p=require('./packages/$pkg/package.json');
                console.log(p.name);
              } catch(e) {
                process.exit(0);
              }
            ")

            if [ ! -z "$PKG_NAME" ]; then
              echo "\"$PKG_NAME\": patch" >> $FILE
            fi
          done

          echo "---" >> $FILE

          REPO_URL="https://github.com/${{ github.repository }}"

          echo "" >> $FILE
          echo "### Commits included in this release:" >> $FILE

          git log $BASE..$HEAD \
            --no-merges \
            --pretty=format:"%H|%s" | while IFS="|" read -r hash msg
          do
            short=${hash:0:7}
            echo "- $msg ([${short}]($REPO_URL/commit/$hash))" >> $FILE
          done

      # 🔥 IMPORTANT FIX: COMMIT THE CHANGESET
      - name: Commit changeset
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .changeset

          if git diff --cached --quiet; then
            echo "No changeset to commit"
            exit 0
          fi

          git commit -m "chore: add changeset"
          git push

      # 🚀 Now changesets can detect it
      - name: Create Pull Request
        uses: changesets/action@v1
        with:
          title: "chore: release packages"
          commit: "chore: release packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
