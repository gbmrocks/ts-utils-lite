name: Create Draft Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  create-draft:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version bump
        id: version
        run: |
          git fetch --tags
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -z "$LAST_TAG" ]; then
            LAST_TAG="v0.0.0"
          fi

          COMMITS=$(git log $LAST_TAG..HEAD --pretty=format:"%s" | grep -v "bump version" | head -20)

          if [ -z "$COMMITS" ]; then
            echo "No new commits"
            exit 0
          fi

          MAJOR=false
          MINOR=false

          if echo "$COMMITS" | grep -qE "BREAKING CHANGE:|feat!|fix!"; then
            MAJOR=true
          elif echo "$COMMITS" | grep -q "^feat:"; then
            MINOR=true
          fi

          LAST_VERSION=${LAST_TAG#v}
          IFS='.' read -ra VER <<< "$LAST_VERSION"
          MAJ=${VER[0]:-0}
          MIN=${VER[1]:-0}
          PAT=${VER[2]:-0}

          if [ "$MAJOR" = true ]; then
            MAJ=$((MAJ + 1)); MIN=0; PAT=0
          elif [ "$MINOR" = true ]; then
            MIN=$((MIN + 1)); PAT=0
          else
            PAT=$((PAT + 1))
          fi

          NEW_VERSION="v${MAJ}.${MIN}.${PAT}"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Create tag
        run: |
          git tag ${{ steps.version.outputs.new_version }}
          git push origin ${{ steps.version.outputs.new_version }}

      - name: Create Draft Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.version.outputs.new_version }}
          release_name: Release ${{ steps.version.outputs.new_version }}
          body: "Draft release - click Publish to release to npm"
          draft: true
