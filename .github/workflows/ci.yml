name: Auto Changeset PR

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  changeset:
    # prevent loop from release commits
    if: "!contains(github.event.head_commit.message, 'chore(release): version packages [skip ci]')"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install deps
        run: npm install

      # 🔥 AUTO CREATE CHANGESET (THIS WAS MISSING BEFORE)
      - name: Generate changeset if needed
        run: |
          CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} \
            | grep '^packages/' \
            | grep -v '/dist/' \
            | cut -d/ -f2 \
            | sort -u || true)

          if [ -z "$CHANGED" ]; then
            echo "No package changes"
            exit 0
          fi

          mkdir -p .changeset
          FILE=".changeset/auto-$(date +%s).md"

          echo "---" > $FILE

          for pkg in $CHANGED; do
            echo "\"$pkg\": patch" >> $FILE
          done

          echo "---" >> $FILE
          echo "" >> $FILE
          echo "auto release" >> $FILE

      # 🔥 CREATE PR (NOW IT WORKS)
      - name: Create Release PR
        uses: changesets/action@v1
        with:
          title: "chore(release): version packages [skip ci]"
          commit: "chore(release): version packages [skip ci]"
          version: npx changeset version
          publish: npx changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
