name: Changeset PR

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  changeset:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install
        run: npm install

      # 🚨 ONLY create changeset if none exists
      - name: Create changeset if needed
        run: |
          if [ -z "$(find .changeset -name '*.md' 2>/dev/null | grep -v README)" ]; then
            mkdir -p .changeset
            echo "---" > .changeset/auto.md
            echo '"ts-array-lite": patch' >> .changeset/auto.md
            echo "---" >> .changeset/auto.md
            echo "auto" >> .changeset/auto.md
          fi

      - name: Create PR
        uses: changesets/action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
