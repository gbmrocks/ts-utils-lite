name: Auto Changeset PR

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  changeset:
    # ignore release commits
    if: "!contains(github.event.head_commit.message, 'chore: release')"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install deps
        run: npm install

      # 🔥 AUTO CHANGESET GENERATION
      - name: Generate changeset if needed
        run: |
          CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} \
            | grep '^packages/' \
            | grep -v '/dist/' \
            | cut -d/ -f2 \
            | sort -u || true)

          if [ -z "$CHANGED" ]; then
            echo "No package changes"
            exit 0
          fi

          mkdir -p .changeset
          FILE=".changeset/auto-$(date +%s).md"

          echo "---" > $FILE

          for pkg in $CHANGED; do
            # convert folder → real package name
            PKG_NAME=$(node -e "
              const fs=require('fs');
              const p=require('./packages/$pkg/package.json');
              console.log(p.name);
            " 2>/dev/null)

            echo "\"$PKG_NAME\": patch" >> $FILE
          done

          echo "---" >> $FILE
          echo "" >> $FILE
          echo "auto release" >> $FILE

      # 🚀 CREATE PR ONLY (IMPORTANT FIX)
      - name: Create PR
        uses: changesets/action@v1
        with:
          title: "chore: release packages"
          commit: "chore: release packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
